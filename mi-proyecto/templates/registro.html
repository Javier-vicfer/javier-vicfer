<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro</title>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>
    <div class="container">
        <h2>Crear Cuenta</h2>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <p class="error">{{ message }}</p>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/registro" method="POST">
            <input type="text" name="username" placeholder="Elige un usuario" required>
            <input type="password" name="password" placeholder="Elige una contraseña" required>
            <button type="submit">Registrarme</button>
        </form>
        <p>¿Ya tienes cuenta? <a href="../templates/login.html">Inicia sesión</a></p>
    </div>
</body>
</html>
